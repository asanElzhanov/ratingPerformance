{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    {% block extra_css %}{% endblock %}
    <style>
        a {
            text-decoration: none; /* убираем подчёркивание */
        }

        a:hover {
            text-decoration: underline; /* добавляем при наведении */
        }

        header a:hover,
        header a:focus {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header style="z-index: 10;">
        <a href="{% url 'main:mainPage' %}">
            <div style="display: flex; align-items: center; gap:20px;">
                <img src="{% static 'main/img/emblem.png' %}" alt="Logo" style="width: 64px; height: 64px;">
                <span class="header-title" style="width:150px;">Система оценки эффективности</span>
            </div>
        </a>
            {% block headerMenu %}{% endblock %}
        </div>
    </header>
    <div style="padding: 28px 10vw;">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
